<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindMeHere Directory | Share-first creator profiles</title>
  <meta
    name="description"
    content="Browse the FindMeHere directory for share-first creator profiles and standalone public links at findmehere.live."
  />
  <meta property="og:title" content="FindMeHere Directory | Share-first creator profiles" />
  <meta property="og:description" content="Browse the FindMeHere directory for share-first creator profiles and standalone public links at findmehere.live." />
  <link rel="canonical" href="https://findmehere.live/" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <script>
    (function () {
      var key = "fmh-theme";
      var theme = "dark";
      try {
        var stored = window.localStorage.getItem(key);
        if (stored === "light" || stored === "dark") theme = stored;
      } catch (_error) {
        theme = "dark";
      }
      document.documentElement.setAttribute("data-fmh-theme", theme);
      document.documentElement.style.colorScheme = theme;
    })();
  </script>
  <link rel="stylesheet" href="/css/theme-dark.css" />
  <link rel="stylesheet" href="/css/findmehere.css" />
</head>
<body class="findmehere-page">
  <div id="app"></div>
  <script src="/js/findmehere-app.js" defer></script>
</body>
</html>
